name: TVBox 接口自动化私有化

on:
  schedule:
    - cron: '0 21 * * *' # 每天北京时间凌晨 5 点运行
  workflow_dispatch:      # 支持点击按钮手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # 对应 V1.7 优化：始终保持轻量化提交

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装容器核心依赖
        run: |
          pip install requests aiohttp beautifulsoup4 pycryptodome # 容器运行所需的基础库

      - name: 运行私有化清洗脚本
        env:
          USERNAME: ${{ secrets.MY_USERNAME }}
          TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          # 1. 在容器外先手动创建文件夹，防止脚本找不到路径
          mkdir -p ol
          
          # 2. 运行 Docker，注意 mirror=0 强制使用原生 GitHub
          docker run --rm \
            -v $(pwd)/ol:/ol \
            -e username=${{ secrets.MY_USERNAME }} \
            -e token=${{ secrets.MY_GITHUB_TOKEN }} \
            -e url='https://www.iyouhun.com/tv/0,http://肥猫.com?&signame=肥猫' \
            -e repo='ol' \
            -e mirror=0 \
            2011820123/tvbox:latest

      - name: 强制推送到当前仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "TVBox_Bot"
          git add .
          # V1.7 逻辑：重置提交记录，防止仓库过大
          git commit --amend -m "Update TVBox Interface $(date +'%Y-%m-%d %H:%M')" || git commit -m "Update TVBox"
          git push --force

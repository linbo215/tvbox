name: TVBox_Interface_Sync_With_Index

on:
  schedule:
    - cron: '0 23 * * *' # 北京时间凌晨 5 点
  workflow_dispatch:      # 支持手动运行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 【配置项】请在此处填写你在 CF 绑定的域名，不要带最后的斜杠
  CF_DOMAIN: "https://box.yobz.de5.net" 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 检出目标仓库 (ol)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ol
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: ol
          persist-credentials: true

      - name: 2. 环境预处理
        run: |
          mkdir -p ol/jar
          git config --global --add safe.directory /home/runner/work/${{ github.event.repository.name }}/ol

      - name: 3. 运行 Docker 清洗工具
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ol:/ol \
            -e username=${{ secrets.MY_USERNAME }} \
            -e token=${{ secrets.MY_GITHUB_TOKEN }} \
            -e url='http://肥猫.com?&signame=肥猫,https://7337.kstore.space/qxys/%E7%A6%81%E6%AD%A2%E4%BC%A0%E6%92%AD.json?&signame=传播,http://fty.xxooo.cf/tv?&signame=饭太硬,https://raw.liucn.cc/box/m.json?&signame=老刘备,https://盒子迷.top/禁止贩卖?&signame=盒子迷,http://tvbox.xn--4kq62z5rby2qupq9ub.top/?&signame=放牛,https://raw.githubusercontent.com/xyq254245/xyqonlinerule/main/XYQTVBox.json?&signame=香雅情,http://home.jundie.top:81/top98.json?&signame=俊佬,https://raw.githubusercontent.com/guot55/yg/main/max.json?&signame=月光,https://raw.githubusercontent.com/HeChengChaXiu/tvbox/main/hccx.json?&signame=荷城茶秀,https://raw.githubusercontent.com/yoursmile66/TVBox/main/XC.json?&signame=南风,https://7337.kstore.space/qxys/%E7%A6%81%E6%AD%A2%E4%BC%A0%E6%92%AD.json?&signame=传播' \
            -e repo='ol' \
            -e mirror=0 \
            -e target='tvbox.json' \
            -e jar_suffix='css' \
            2011820123/tvbox:latest || echo "任务执行中..."

      - name: 4. 深度定制修正与链接替换
        working-directory: ./ol
        run: |
          sudo chown -R $USER:$USER .
          
          # A. 格式转换 (css -> jar)
          if [ -d "jar" ]; then
            find jar -name "*.css" -exec sh -c 'mv "$1" "${1%.css}.jar"' _ {} \;
          fi

          # B. 基础修正
          sed -i 's/\.css/.jar/g' *.json *.txt || true
          sed -i 's#https://ghp.ci/##g' *.json *.txt || true
          sed -i 's#/main/#/master/#g' *.json *.txt || true

          # C. 【新增】将 GitHub 链接替换为 CF 域名
          # 匹配 raw.githubusercontent.com/.../ol/master/ 替换为 CF_DOMAIN/
          GITHUB_RAW_URL="https://raw.githubusercontent.com/linbo215/ol/master"
          find . -type f \( -name "*.json" -o -name "*.txt" \) -exec sed -i "s#${GITHUB_RAW_URL}#${{ env.CF_DOMAIN }}#g" {} +

          # D. all.json 精简
          if [ -f "all.json" ]; then
            cat all.json | jq '.urls |= map(select(.name | test("tvbox_tools|requirements|KsTOZZ|cnb|run\\.py|index\\.html") | not))' > tmp.json
            mv tmp.json all.json
          fi

      - name: 5. 生成 Index.html 静态页面
        working-directory: ./ol
        run: |
          # 1. 编写 HTML 头部（注意：这里使用 'EOF' 加引号防止变量被 Shell 提前解析）
          cat <<'EOF' > index.html
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>TVBox 接口发布页</title>
              <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
              <style>
                  body { background-color: #f8f9fa; padding-top: 50px; }
                  .container { max-width: 900px; }
                  .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
                  .list-group-item { border: none; border-bottom: 1px solid #f1f1f1; padding: 15px 20px; transition: all 0.2s; }
                  .list-group-item:hover { background-color: #fcfcfc; transform: translateX(5px); }
                  .file-name { font-weight: 500; color: #495057; text-decoration: none; }
                  .btn-copy { border-radius: 8px; font-size: 0.8rem; padding: 4px 12px; }
                  .badge-date { font-size: 0.7rem; color: #adb5bd; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="card p-4">
                      <div class="d-flex justify-content-between align-items-center mb-4">
                          <h2 class="mb-0">📺 TVBox 私有接口目录</h2>
                          <span class="badge bg-primary">已绑定 Cloudflare</span>
                      </div>
                      <div class="alert alert-light border-0 bg-light mb-4">
                          <small class="text-muted">当前加速域名：</small>
                          <code class="d-block mt-1">${{ env.CF_DOMAIN }}</code>
                      </div>
                      <div class="list-group">
          EOF

          # 2. 动态生成文件列表（修复了 ${file#./} 的转义问题）
          find . -maxdepth 1 -type f \( -name "*.json" -o -name "*.txt" \) ! -name "all.json" | sort | while read file; do
              filename=$(echo "$file" | sed 's|./||')
              echo "                        <div class=\"list-group-item d-flex justify-content-between align-items-center\">" >> index.html
              echo "                            <a href=\"$filename\" class=\"file-name\">📄 $filename</a>" >> index.html
              echo "                            <button class=\"btn btn-outline-primary btn-copy\" onclick=\"copyToClipboard('${{ env.CF_DOMAIN }}/$filename')\">点击复制</button>" >> index.html
              echo "                        </div>" >> index.html
          done

          # 3. 编写 HTML 尾部
          cat <<'EOF' >> index.html
                      </div>
                      <div class="mt-4 pt-3 border-top text-center">
                          <p class="badge-date">最后更新时间：$(date +'%Y-%m-%d %H:%M:%S')</p>
                      </div>
                  </div>
              </div>
              <script>
                  function copyToClipboard(text) {
                      navigator.clipboard.writeText(text).then(function() {
                          alert('✅ 链接已复制到剪贴板');
                      }, function(err) {
                          // 兼容旧版浏览器
                          var input = document.createElement('input');
                          input.setAttribute('value', text);
                          document.body.appendChild(input);
                          input.select();
                          document.execCommand('copy');
                          document.body.removeChild(input);
                          alert('✅ 链接已复制');
                      });
                  }
              </script>
          </body>
          </html>
          EOF

      - name: 6. 提交并推送到仓库
        working-directory: ./ol
        run: |
          git config --global --add safe.directory $(pwd)
          git config --local user.email "action@github.com"
          git config --local user.name "TVBox_Bot"
          
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update TVBox Interface & Index.html $(date +'%Y-%m-%d %H:%M')"
            git push origin master
          else
            echo "没有发现内容变化，跳过推送。"
          fi

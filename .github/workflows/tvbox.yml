name: TVBox_Interface_Sync

on:
  schedule:
    - cron: '0 21 * * *' # 每天北京时间凌晨 5 点自动运行
  workflow_dispatch:      # 支持手动点击按钮运行

# 强制使用最新 Node.js 环境，解决弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 检出目标仓库 (ol)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ol
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: ol
          persist-credentials: true

      - name: 2. 预处理环境
        run: |
          # 确保目录存在并清理旧的随机乱码文件（可选）
          mkdir -p ol/jar
          # 如果你想每次运行都清空旧文件，可以取消下面这行的注释
          # rm -f ol/*.txt ol/jar/*.jar

      - name: 3. 运行 Docker 清洗工具 (抓取与清洗)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ol:/ol \
            -e username=${{ secrets.MY_USERNAME }} \
            -e token=${{ secrets.MY_GITHUB_TOKEN }} \
            -e url='http://肥猫.com?&signame=肥猫,http://fty.xxooo.cf/tv?&signame=饭太硬' \
            -e repo='ol' \
            -e mirror=0 \
            -e target='tvbox.json' \
            -e jar_suffix='css' \
            2011820123/tvbox:latest || echo "⚠️ 部分加密接口解析失败，跳过该接口继续加工..."

      - name: 4. 权限抢回与二次加工 (含所有文件修正)
        working-directory: ./ol
        run: |
          # A. 抢回权限
          sudo chown -R $USER:$USER .
          
          # B. 转换 jar 格式
          if [ -d "jar" ]; then
            find jar -name "*.css" -exec sh -c 'mv "$1" "${1%.css}.jar"' _ {} \;
          fi

          # C. 【核心修正】全局替换：处理所有 .json 和 .txt 文件
          # 1. 把 .css 换成 .jar
          # 2. 去掉 ghp.ci (或者换成别的)
          # 3. 分支名 main 换成 master
          # 注意这里用的是 *.* 或者分两次写，确保覆盖所有文件
          sed -i 's/\.css/.jar/g' *.json *.txt || true
          sed -i 's#https://ghp.ci/##g' *.json *.txt || true
          sed -i 's#/main/#/master/#g' *.json *.txt || true

          # D. all.json 瘦身 (保持不变)
          if [ -f "all.json" ]; then
            cat all.json | jq '.urls |= map(select(.name | test("tvbox_tools|requirements|KsTOZZ|cnb|run\\.py") | not))' > tmp.json
            mv tmp.json all.json
          fi

          # E. 提交推送 (保持不变)
          git config --global --add safe.directory $(pwd)
          git config --local user.email "action@github.com"
          git config --local user.name "TVBox_Bot"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update TVBox (Deep Clean) $(date +'%Y-%m-%d %H:%M')"
            git push origin master
          fi

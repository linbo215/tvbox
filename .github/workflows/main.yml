name: TVBox_Interface_Sync dan

on:

  workflow_dispatch:      # 支持手动运行

# 环境变量优化
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 检出目标仓库 (ol)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ol
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: ol
          persist-credentials: true

      - name: 2. 环境预处理
        run: |
          # 提前创建目录，减少 Docker 运行时的冲突
          mkdir -p ol/jar
          # 清理 Git 安全目录警告（针对宿主机环境）
          git config --global --add safe.directory /home/runner/work/${{ github.event.repository.name }}/ol

      - name: 3. 运行 Docker 清洗工具
        run: |
          # 将 URL 存入环境变量，避免 shell 转义错误
          TARGET_URL=',https://yubo.boh.de5.net/001.json?&signame=Easy'
          
          docker run --rm \
            -v ${{ github.workspace }}/ol:/ol \
            -e username=${{ secrets.MY_USERNAME }} \
            -e token=${{ secrets.MY_GITHUB_TOKEN }} \
            -e url="$TARGET_URL" \
            -e repo='ol' \
            -e mirror=0 \
            -e target='tvbox.json' \
            -e jar_suffix='css' \
            2011820123/tvbox:latest || echo "任务执行中..."

      - name: 4. 权限抢回与深度定制修正
        working-directory: ./ol
        run: |
          # A. 抢回所有权
          sudo chown -R $USER:$USER .
          
          # B. 格式转换 (css -> jar)
          if [ -d "jar" ]; then
            find jar -name "*.css" -exec sh -c 'mv "$1" "${1%.css}.jar"' _ {} \;
          fi

          # C. 链接修正 (处理所有 .json 和 .txt)
          # 1. 修正后缀 2. 移除加速镜像 3. 修正分支名
          sed -i 's/\.css/.jar/g' *.json *.txt || true
          sed -i 's#https://ghp.ci/##g' *.json *.txt || true
          sed -i 's#/main/#/master/#g' *.json *.txt || true

          # D. all.json 精简 (剔除 GitHub 系统文件和乱码文件)
          if [ -f "all.json" ]; then
            cat all.json | jq '.urls |= map(select(.name | test("tvbox_tools|requirements|KsTOZZ|cnb|run\\.py") | not))' > tmp.json
            mv tmp.json all.json
          fi

      - name: 5. 提交并推送到仓库
        working-directory: ./ol
        run: |
          # 再次确认安全目录
          git config --global --add safe.directory $(pwd)
          git config --local user.email "action@github.com"
          git config --local user.name "TVBox_Bot"
          
          git add .
          
          # 检查是否有文件更新
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update TVBox Interface (Deep Clean) $(date +'%Y-%m-%d %H:%M')"
            git push origin master
          else
            echo "没有发现内容变化，跳过推送。"
          fi
